<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%sveltekit.assets%/favicon.png" />

    <!--
      Fonts load async so they don't block first paint (LCP). The media="print"
      → onload="this.media='all'" trick fetches the stylesheet without render-
      blocking, then applies it once loaded; <noscript> covers JS-disabled.
      Besley is requested upright-only (no italics are used) to trim the payload.
    -->
    <link rel="preconnect" href="https://use.typekit.net" crossorigin />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://use.typekit.net/noj4tji.css" />
    <link
      rel="stylesheet"
      href="https://use.typekit.net/noj4tji.css"
      media="print"
      onload="this.media = 'all'"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Besley:wght@400..900&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link rel="stylesheet" href="https://use.typekit.net/noj4tji.css" />
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Besley:wght@400..900&display=swap"
      />
    </noscript>
    <meta name="viewport" content="width=device-width" />
    %sveltekit.head%

    <!--
      Google tag (gtag.js) — privacy-hardened (MED-7). gtag.js is NOT loaded on
      landing; it's deferred until the first real interaction (scroll / pointer /
      key / touch), so no analytics cookies are set for a visitor who never
      engages. When it does load we enable IP anonymisation and SameSite=Lax;
      Secure cookie flags. Trade-off: a zero-interaction bounce isn't counted.
    -->
    <script>
      (function () {
        var GA_ID = "G-2CZMPGL9RR";
        window.dataLayer = window.dataLayer || [];
        function gtag() {
          dataLayer.push(arguments);
        }
        window.gtag = gtag;

        var events = ["pointerdown", "keydown", "scroll", "touchstart"];
        var loaded = false;
        function loadGA() {
          if (loaded) return;
          loaded = true;
          events.forEach(function (e) {
            window.removeEventListener(e, loadGA);
          });
          var s = document.createElement("script");
          s.async = true;
          s.src = "https://www.googletagmanager.com/gtag/js?id=" + GA_ID;
          document.head.appendChild(s);
          gtag("js", new Date());
          gtag("config", GA_ID, {
            anonymize_ip: true,
            cookie_flags: "SameSite=Lax;Secure",
          });
        }
        events.forEach(function (e) {
          window.addEventListener(e, loadGA, { passive: true });
        });
      })();
    </script>
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="background-color: #fff; display: contents">%sveltekit.body%</div>
  </body>
</html>
