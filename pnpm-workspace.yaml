# pnpm 11 reads project settings from here (the package.json "pnpm" field is no longer read).
# allowBuilds replaces the removed onlyBuiltDependencies; strictDepBuilds defaults to true in v11,
# so any package with build scripts that isn't listed here fails with ERR_PNPM_IGNORED_BUILDS.
allowBuilds:
  "@scarf/scarf": false
  esbuild: true
  protobufjs: true
  sharp: true

# pnpm 11 enables a 24h supply-chain release-age cooldown BY DEFAULT (pnpm 10 had none). With our
# Renovate automation that breaks CI on every same-day bump and holds us ~24h behind latest, so we
# disable it to preserve pnpm 10 behavior (no security regression vs. what we ran before).
#
# To opt into the cooldown later: set minimumReleaseAge to e.g. 1440 (minutes), add
#   minimumReleaseAgeExclude: ['@reddoorla/*']
# so our own freshly-published packages install immediately, and set Renovate's minimumReleaseAge
# to >= the cooldown in the org preset so it never proposes deps younger than the window.
minimumReleaseAge: 0

# Two sharp majors were being installed: 0.34.5 (via @reddoorla/maintenance, runtime)
# and 0.33.5 (via @zerodevx/svelte-img → vite-imagetools → imagetools-core ^0.33.1,
# build-time). The disjoint caret ranges can't dedupe, so both native libvips dylibs
# land on disk (and macOS logs a "GNotificationCenterDelegate implemented in both …"
# duplicate-class warning on every run). Force a single sharp; imagetools-core 6.x
# transforms fine on 0.34.
overrides:
  sharp: "0.34.5"
